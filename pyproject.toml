[project]
name = "initiative-tracker"
version = "0.0.0"
authors = [
    { name = "Iraklis Konsoulas", email = "dyka3773@gmail.com" },
]
description = "A simple initiative tracker for Dungeons & Dragons 5.5th Edition."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
keywords = [
    "dnd",
    "initiative tracker",
    "dungeons and dragons",
    "webapp",
]
dependencies = []

[project.urls]
source = "https://github.com/dyka3773/5.5e-initiative-tracker"

[project.scripts]
server = "initiative_tracker.server:main"

[build-system]
requires = ["uv_build>=0.10.8,<0.11.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.semantic_release]
build_command = """
    python -m pip install uv
    uv lock --upgrade-package initiative-tracker
    git add uv.lock
    uv build
"""
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "conventional"
logging_use_named_masks = false
major_on_zero = true
allow_zero_version = true
tag_format = "v{version}"
version_toml = ["pyproject.toml:project.version"]

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[tool.semantic_release.changelog]
exclude_commit_patterns = []
mode = "update"
insertion_flag = "<!-- insertion marker -->"
template_dir = "templates" # That means we should avoid creating such a folder unless we have custom changelog templates

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
output_format = "md"
mask_initial_release = false

[tool.semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf", "deps"]
allowed_tags = ["feat", "fix", "perf", "build", "chore", "ci", "docs", "style", "refactor", "test", "deps"]
parse_squash_commits = true
ignore_merge_commits = true

[tool.tox]
env_list = ["lint", "3.14"]

[tool.tox.env_run_base]
description = "Run tests with the current Python version"
deps = [
    "pytest==9.0.2",
]
commands = [[ "pytest", "-v" ]]

[tool.tox.env.lint]
description = "Lint the codebase with ruff"
deps = [
    "ruff==0.12.3",
]
skip_install = true
commands = [[ "ruff", "check", "src/", "tests/" ]]